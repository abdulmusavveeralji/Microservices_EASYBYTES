server:
  port: 8080
spring:
  application:
    name: "accounts"
  profiles:
    active: "prod"
  main:
    banner-mode: off
  datasource:
    url: jdbc:mysql://localhost:3306/accountsdb
    username: root
    password: root
#    driver-class-ame: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
  sql:
    init:
      mode: always
  config:
    import: "optional:configserver:http://localhost:8071/"
  rabbitmq:
    host: "localhost"
    port: 5672
    username: "guest"
    password: "guest"

management:
  endpoints:
    web:
      exposure:
        include: "*"